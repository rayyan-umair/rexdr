# =============================================================================
# REXDR - Nginx Gateway Configuration
# nginx.conf
#
# Author  : Rayyan Umair
# Date    : 2026-06-20
# Purpose : Single entry point for the entire REXDR platform. Serves the
#           React frontend, proxies REST API calls to the correct engine
#           by path prefix, and proxies WebSocket connections with the
#           required Upgrade headers. The browser only ever talks to one
#           origin - this file is what makes that possible.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------

    log_format rexdr_format '$remote_addr - [$time_local] "$request" '
                             '$status $body_bytes_sent "$http_referer" '
                             '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log rexdr_format;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------------
    # Upstream engine definitions
    # -------------------------------------------------------------------------

    upstream windows_event_upstream    { server windows-event:8000; }
    upstream network_flow_upstream     { server network-flow:8001; }
    upstream siem_upstream             { server siem:8002; }
    upstream dns_upstream              { server dns:8003; }
    upstream identity_upstream         { server identity:8004; }
    upstream response_upstream         { server response:8005; }
    upstream asset_discovery_upstream  { server asset-discovery:8006; }
    upstream vulnerability_upstream    { server vulnerability:8007; }
    upstream frontend_upstream         { server frontend:3000; }

    # -------------------------------------------------------------------------
    # Rate limiting - protects engine APIs from runaway client loops
    # -------------------------------------------------------------------------

    limit_req_zone $binary_remote_addr zone=rexdr_api:10m rate=20r/s;

    # -------------------------------------------------------------------------
    # Main server block
    # -------------------------------------------------------------------------

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # -- Health check for Docker -----------------------------------------
        location = /health {
            access_log off;
            return 200 "REXDR gateway healthy\n";
            add_header Content-Type text/plain;
        }

        # -- REST API routing - one block per engine -------------------------

        location /api/windows-event/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/windows-event/(.*)$ /$1 break;
            proxy_pass http://windows_event_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/network-flow/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/network-flow/(.*)$ /$1 break;
            proxy_pass http://network_flow_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/siem/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/siem/(.*)$ /$1 break;
            proxy_pass http://siem_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/dns/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/dns/(.*)$ /$1 break;
            proxy_pass http://dns_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/identity/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/identity/(.*)$ /$1 break;
            proxy_pass http://identity_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/response/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/response/(.*)$ /$1 break;
            proxy_pass http://response_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/asset-discovery/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/asset-discovery/(.*)$ /$1 break;
            proxy_pass http://asset_discovery_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/vulnerability/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/vulnerability/(.*)$ /$1 break;
            proxy_pass http://vulnerability_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        # -- WebSocket routing - one block per engine, Upgrade headers required --

        location /ws-api/windows-event/ {
            rewrite ^/ws-api/windows-event/(.*)$ /$1 break;
            proxy_pass http://windows_event_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/network-flow/ {
            rewrite ^/ws-api/network-flow/(.*)$ /$1 break;
            proxy_pass http://network_flow_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/siem/ {
            rewrite ^/ws-api/siem/(.*)$ /$1 break;
            proxy_pass http://siem_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/dns/ {
            rewrite ^/ws-api/dns/(.*)$ /$1 break;
            proxy_pass http://dns_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/identity/ {
            rewrite ^/ws-api/identity/(.*)$ /$1 break;
            proxy_pass http://identity_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/response/ {
            rewrite ^/ws-api/response/(.*)$ /$1 break;
            proxy_pass http://response_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/asset-discovery/ {
            rewrite ^/ws-api/asset-discovery/(.*)$ /$1 break;
            proxy_pass http://asset_discovery_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/vulnerability/ {
            rewrite ^/ws-api/vulnerability/(.*)$ /$1 break;
            proxy_pass http://vulnerability_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        # -- Frontend - everything else falls through to the React app --------

        location / {
            proxy_pass http://frontend_upstream;
            include /etc/nginx/proxy_params.conf;
        }
    }
}