# =============================================================================
# REXDR - Nginx Gateway Configuration
# nginx.conf
#
# Author  : Rayyan Umair
# Date    : 2026-06-20
# Updated : 2026-07-01 - Switched bridge-networked upstreams (windows-event,
#           siem, identity, response, vulnerability, frontend) from static
#           `upstream {}` blocks to `resolver` + `set` + variable in
#           `proxy_pass`. Static upstream blocks resolve the container
#           hostname once at nginx startup and cache it for the life of the
#           worker - if a container is later recreated (new build, restart)
#           it gets a new IP on rexdr_internal, and nginx keeps proxying to
#           the old dead IP until nginx itself is restarted (502 Bad
#           Gateway). The resolver + variable pattern forces nginx to
#           re-resolve the Docker embedded DNS (127.0.0.11) periodically
#           instead of caching forever. host.docker.internal-based
#           upstreams (network-flow, dns, asset-discovery) are untouched -
#           that's a stable host gateway address, not a container name.
# Purpose : Single entry point for the entire REXDR platform. Serves the
#           React frontend, proxies REST API calls to the correct engine
#           by path prefix, and proxies WebSocket connections with the
#           required Upgrade headers. The browser only ever talks to one
#           origin - this file is what makes that possible.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # DNS resolver - Docker's embedded DNS server. Required for the variable-
    # based proxy_pass upstreams below to re-resolve container IPs instead of
    # caching them forever. valid=10s means nginx will re-check every 10s.
    # -------------------------------------------------------------------------

    resolver 127.0.0.11 valid=10s ipv6=off;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------

    log_format rexdr_format '$remote_addr - [$time_local] "$request" '
                             '$status $body_bytes_sent "$http_referer" '
                             '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log rexdr_format;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------------
    # Static upstream definitions - host.docker.internal only. This is a
    # fixed gateway IP managed by Docker itself, not a container hostname,
    # so it doesn't suffer from the stale-IP-on-recreate problem and does
    # not need the dynamic resolver pattern.
    # -------------------------------------------------------------------------

    upstream network_flow_upstream     { server host.docker.internal:8001; }
    upstream dns_upstream              { server host.docker.internal:8003; }
    upstream asset_discovery_upstream  { server host.docker.internal:8006; }

    # -------------------------------------------------------------------------
    # Rate limiting - protects engine APIs from runaway client loops
    # -------------------------------------------------------------------------

    limit_req_zone $binary_remote_addr zone=rexdr_api:10m rate=20r/s;

    # -------------------------------------------------------------------------
    # Main server block
    # -------------------------------------------------------------------------

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # -- Health check for Docker -----------------------------------------
        location = /health {
            access_log off;
            return 200 "REXDR gateway healthy\n";
            add_header Content-Type text/plain;
        }

        # -- REST API routing - one block per engine -------------------------

        location /api/windows-event/ {
            set $windows_event_backend windows-event:8000;
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/windows-event/(.*)$ /$1 break;
            proxy_pass http://$windows_event_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/network-flow/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/network-flow/(.*)$ /$1 break;
            proxy_pass http://network_flow_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/siem/ {
            set $siem_backend siem:8002;
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/siem/(.*)$ /$1 break;
            proxy_pass http://$siem_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/dns/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/dns/(.*)$ /$1 break;
            proxy_pass http://dns_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/identity/ {
            set $identity_backend identity:8004;
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/identity/(.*)$ /$1 break;
            proxy_pass http://$identity_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/response/ {
            set $response_backend response:8005;
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/response/(.*)$ /$1 break;
            proxy_pass http://$response_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/asset-discovery/ {
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/asset-discovery/(.*)$ /$1 break;
            proxy_pass http://asset_discovery_upstream;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/vulnerability/ {
            set $vulnerability_backend vulnerability:8007;
            limit_req zone=rexdr_api burst=40 nodelay;
            rewrite ^/api/vulnerability/(.*)$ /$1 break;
            proxy_pass http://$vulnerability_backend;
            include /etc/nginx/proxy_params.conf;
        }

        # -- WebSocket routing - one block per engine, Upgrade headers required --

        location /ws-api/windows-event/ {
            set $windows_event_ws_backend windows-event:8000;
            rewrite ^/ws-api/windows-event/(.*)$ /$1 break;
            proxy_pass http://$windows_event_ws_backend;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/network-flow/ {
            rewrite ^/ws-api/network-flow/(.*)$ /$1 break;
            proxy_pass http://network_flow_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/siem/ {
            set $siem_ws_backend siem:8002;
            rewrite ^/ws-api/siem/(.*)$ /$1 break;
            proxy_pass http://$siem_ws_backend;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/dns/ {
            rewrite ^/ws-api/dns/(.*)$ /$1 break;
            proxy_pass http://dns_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/identity/ {
            set $identity_ws_backend identity:8004;
            rewrite ^/ws-api/identity/(.*)$ /$1 break;
            proxy_pass http://$identity_ws_backend;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/response/ {
            set $response_ws_backend response:8005;
            rewrite ^/ws-api/response/(.*)$ /$1 break;
            proxy_pass http://$response_ws_backend;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/asset-discovery/ {
            rewrite ^/ws-api/asset-discovery/(.*)$ /$1 break;
            proxy_pass http://asset_discovery_upstream;
            include /etc/nginx/proxy_ws_params.conf;
        }

        location /ws-api/vulnerability/ {
            set $vulnerability_ws_backend vulnerability:8007;
            rewrite ^/ws-api/vulnerability/(.*)$ /$1 break;
            proxy_pass http://$vulnerability_ws_backend;
            include /etc/nginx/proxy_ws_params.conf;
        }

        # -- Frontend - everything else falls through to the React app --------

        location / {
            set $frontend_backend frontend:3000;
            proxy_pass http://$frontend_backend;
            include /etc/nginx/proxy_params.conf;
        }
    }
}