# =============================================================================
# REXDR - WebSocket Reverse Proxy Headers
# proxy_ws_params.conf
#
# Author  : Rayyan Umair
# Date    : 2026-06-20
# Purpose : The Upgrade and Connection headers required for WebSocket
#           proxying. Without these, the Upgrade handshake fails and
#           connections silently drop - this is the single most common
#           Nginx + WebSocket mistake, and it is non-negotiable here.
#           Read/send timeouts are extended since WebSocket connections
#           are long-lived by design, not request/response cycles.
# =============================================================================

proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "Upgrade";
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_cache_bypass $http_upgrade;
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;