# =============================================================================
# REXDR - Standard Reverse Proxy Headers
# proxy_params.conf
#
# Author  : Rayyan Umair
# Date    : 2026-06-20
# Purpose : Shared proxy headers included by every standard REST API
#           location block. Keeps the real client IP and original host
#           visible to engines for logging and rate-limit decisions.
# =============================================================================

proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_connect_timeout 10s;
proxy_read_timeout 30s;
proxy_send_timeout 30s;